<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMC The Courtyard — Resident Map</title>
<script src="auth.js"></script>
<style>
  :root {
    --cream: #f5f0e8;
    --warm: #faf7f2;
    --stone: #b8ad9e;
    --dark: #1e1a16;
    --mid: #6b5f52;
    --accent: #7a5c3e;
    --accent2: #c4956a;
    --green: #3d6b4a;
    --red: #8b3a3a;
    --border: #ddd5c8;
    --shadow: 0 4px 24px rgba(30,26,22,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 14px; background: var(--cream); color: var(--dark); min-height: 100vh; }

  /* ── Header ── */
  header {
    background: var(--dark); padding: 1.5rem 2.5rem;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 1rem;
    border-bottom: 1px solid rgba(196,149,106,0.2);
    position: relative;
  }
  .header-brand { display: flex; align-items: center; gap: 1rem; }
  .header-brand h1 { color: var(--cream); font-size: 1.6rem; font-weight: 500; letter-spacing: 0.03em; }
  .header-brand p { color: var(--stone); font-size: 0.78rem; margin-top: 0.1rem; font-weight: 300; letter-spacing: 0.04em; text-transform: uppercase; }
  #welcomeMsg { font-size: 0.78rem; color: var(--accent2); font-style: italic; margin-top: 0.2rem; }
  .header-actions { display: flex; gap: 0.6rem; align-items: center; }

  .btn { padding: 0.5rem 1.1rem; border-radius: 5px; border: none; cursor: pointer; font-family: Arial, sans-serif; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.03em; transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem; }
  .btn-outline { background: transparent; color: var(--stone); border: 1px solid #3a3530; }
  .btn-outline:hover { background: #2a2520; color: var(--cream); }
  .btn-lock { background: transparent; color: var(--stone); border: 1px solid #3a3530; font-size: 0.75rem; }
  .btn-lock:hover { background: #2a2520; color: #c4956a; }

  /* ── Admin login dropdown ── */
  #adminLoginBox {
    display: none; position: absolute; top: 4.5rem; right: 1.5rem;
    background: var(--dark); border: 1px solid #3a3530; border-radius: 8px;
    padding: 1rem; z-index: 200; min-width: 220px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  #adminLoginBox label { color: var(--stone); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 0.4rem; }
  #adminPwInput { width: 100%; padding: 0.4rem 0.6rem; border-radius: 5px; border: 1px solid #3a3530; background: #1e1a16; color: var(--cream); font-family: Arial, sans-serif; font-size: 0.85rem; margin-bottom: 0.6rem; }
  .login-btns { display: flex; gap: 0.5rem; }
  .btn-login { flex: 2; padding: 0.4rem; background: var(--accent2); color: white; border: none; border-radius: 5px; font-family: Arial, sans-serif; font-weight: 600; cursor: pointer; }
  .btn-login-cancel { flex: 1; padding: 0.4rem; background: #3a3530; color: var(--stone); border: none; border-radius: 5px; font-family: Arial, sans-serif; font-weight: 600; cursor: pointer; }
  #adminErr { color: #e74c3c; font-size: 0.75rem; margin-top: 0.4rem; display: none; }

  /* ── Admin bar ── */
  .admin-bar { background: #2a2520; padding: 0.6rem 1.25rem; display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
  .abtn { padding: 0.3rem 0.85rem; border-radius: 5px; border: none; font-family: Arial, sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; background: var(--accent); color: white; transition: background 0.15s; }
  .abtn:hover { background: #6a4c30; }
  .abtn-muted { background: #3a3530; color: var(--stone); }
  .abtn-muted:hover { background: #4a4540; color: var(--cream); }
  .abtn-exit { background: transparent; color: var(--stone); border: 1px solid #3a3530 !important; margin-left: auto; }
  .abtn-exit:hover { background: #3a3530; color: var(--cream); }

  /* ── Admin modal ── */
  .admin-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 600; align-items: center; justify-content: center; }
  .admin-modal-overlay.open { display: flex; }
  .admin-modal { background: var(--cream); border-radius: 12px; padding: 1.5rem; width: 90%; max-width: 460px; box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
  .admin-modal h3 { font-size: 1rem; color: var(--accent); margin-bottom: 1rem; }
  .admin-modal p { font-size: 0.85rem; color: var(--mid); margin-bottom: 0.5rem; line-height: 1.5; }
  .admin-modal-actions { display: flex; gap: 0.6rem; margin-top: 1.2rem; justify-content: flex-end; }
  .modal-field { margin-bottom: 0.85rem; }
  .modal-field label { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--mid); margin-bottom: 0.3rem; }
  .modal-field input, .modal-field select {
    width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border);
    border-radius: 6px; font-size: 0.9rem; font-family: Arial, sans-serif;
    background: white; color: var(--dark);
  }
  .modal-field input:focus, .modal-field select:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(196,149,106,0.15); }
  .modal-field .hint { font-size: 0.72rem; color: var(--stone); margin-top: 0.3rem; font-style: italic; }
  #adminModalActionBtn { background: var(--accent); }
  #adminModalActionBtn:hover { background: #6a4c30; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
    background: #2a2015; color: var(--cream);
    padding: 0.75rem 1.25rem; border-radius: 6px;
    font-size: 0.83rem; font-weight: 400; letter-spacing: 0.03em;
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.4,0.64,1);
    z-index: 9999; display: flex; align-items: center; gap: 0.5rem;
    max-width: 320px; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.error { background: #2a1515; }

  /* ── Map ── */
  main { max-width: 1300px; margin: 2rem auto; padding: 0 1.5rem 4rem; }
  .page-title { margin-bottom: 1.5rem; }
  .page-title h2 { font-size: 1.4rem; font-weight: 500; color: var(--accent); }
  .page-title p { color: var(--mid); font-size: 0.85rem; margin-top: 0.25rem; }

  .map-layout { display: flex; gap: 2rem; align-items: flex-start; }
  .map-wrap { position: relative; flex: 1 1 auto; min-width: 0; }
  .map-wrap img { width: 100%; display: block; border-radius: 10px; box-shadow: var(--shadow); }

  .hotspot {
    position: absolute; width: 8%; aspect-ratio: 1; border-radius: 50%;
    cursor: pointer; background: transparent; border: none;
    transform: translate(-50%, -50%); transition: transform 0.15s; z-index: 10;
  }
  .hotspot:hover { transform: translate(-50%, -50%) scale(1.15); }
  .hotspot.active { transform: translate(-50%, -50%) scale(1.15); background: rgba(196,149,106,0.35); }
  .hotspot.active::after {
    content: ''; position: absolute; inset: -4px; border-radius: 50%;
    border: 3px solid var(--accent2); animation: pulse 1.2s ease-out infinite;
  }
  @keyframes pulse { 0% { opacity:1; transform:scale(1); } 100% { opacity:0; transform:scale(1.6); } }

  /* ── Legend ── */
  .legend { flex: 0 0 280px; background: white; border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); overflow: hidden; }
  .legend-header { background: var(--dark); padding: 0.75rem 1rem; color: var(--cream); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .legend-list { overflow-y: auto; max-height: 520px; }
  .legend-list::-webkit-scrollbar { width: 5px; }
  .legend-list::-webkit-scrollbar-thumb { background: var(--stone); border-radius: 3px; }
  .legend-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 1rem; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.12s; }
  .legend-row:last-child { border-bottom: none; }
  .legend-row:hover { background: var(--warm); }
  .legend-row.active { background: rgba(196,149,106,0.12); }
  .legend-num { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 700; flex-shrink: 0; }
  .legend-info { flex: 1; min-width: 0; }
  .legend-owner { font-size: 0.85rem; font-weight: 600; color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .legend-tenant { margin-top: 0.2rem; }
  .badge { display: inline-block; font-size: 0.68rem; padding: 0.15rem 0.5rem; border-radius: 3px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .badge-owner  { background: rgba(61,107,74,0.12); color: var(--green); }
  .badge-tenant { background: rgba(196,149,106,0.18); color: var(--accent); }

  /* Admin-only edit button in legend row */
  .legend-edit-btn {
    display: none; flex-shrink: 0;
    background: rgba(122,92,62,0.12); border: none; border-radius: 4px;
    color: var(--accent); font-size: 0.72rem; padding: 0.2rem 0.5rem;
    cursor: pointer; transition: all 0.15s; font-weight: 600; font-family: Arial, sans-serif;
  }
  .legend-edit-btn:hover { background: var(--accent); color: white; }
  body.admin-mode .legend-edit-btn { display: inline-block; }

  .loading   { padding: 1.5rem 1rem; text-align: center; color: var(--mid); font-size: 0.85rem; font-style: italic; }
  .error-msg { padding: 1.5rem 1rem; text-align: center; color: var(--red); font-size: 0.85rem; }

  @media (max-width: 768px) {
    .map-layout { flex-direction: column; }
    .legend { flex: none; width: 100%; }
    .legend-list { max-height: 300px; }
    header { padding: 0.9rem 1rem; }
    .header-brand h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <div>
      <h1>CMC The Courtyard</h1>
      <p>Resident Map</p>
      <p id="welcomeMsg"></p>
    </div>
  </div>

  <div class="header-actions">
    <!-- Admin lock button — shown once password loads from sheet -->
    <button class="btn btn-lock" id="adminBtn" onclick="toggleAdminLogin()" title="Admin login" style="display:none;">&#128274;</button>

    <!-- Password dropdown -->
    <div id="adminLoginBox">
      <label>Admin Password</label>
      <input type="password" id="adminPwInput" placeholder="Enter password…"
        onkeydown="if(event.key==='Enter')checkAdmin();if(event.key==='Escape')toggleAdminLogin()">
      <div class="login-btns">
        <button class="btn-login" onclick="checkAdmin()">Login</button>
        <button class="btn-login-cancel" onclick="toggleAdminLogin()">Cancel</button>
      </div>
      <div id="adminErr">Incorrect password</div>
    </div>

    <button class="btn btn-lock" onclick="window.location.href='index.html'">&#8592; Home</button>
  </div>
</header>

<!-- Admin bar — shown after successful login -->
<div class="admin-bar" id="adminBar" style="display:none;">
  <span style="color:var(--accent2);font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;">&#128274; Admin Mode</span>
  <button class="abtn" onclick="openEditModal(null)">&#9998; Edit Property</button>
  <button class="abtn abtn-muted" onclick="showChangePassword()">&#128272; Change Password</button>
  <button class="abtn abtn-exit" onclick="exitAdmin()">Exit Admin</button>
</div>

<main>
  <div class="page-title">
    <h2>Property Map</h2>
    <p>Tap a property on the map or in the list to highlight it. Admins can edit owner &amp; tenant details.</p>
  </div>

  <div class="map-layout">
    <div class="map-wrap">
      <img src="courtyard-map.jpg" alt="The Courtyard site map">
      <!-- ↓ Keep your original hotspot left/top % values ↓ -->
      <button class="hotspot" data-num="1"  style="left:20%;top:30%"></button>
      <button class="hotspot" data-num="2"  style="left:28%;top:30%"></button>
      <button class="hotspot" data-num="3"  style="left:36%;top:30%"></button>
      <button class="hotspot" data-num="4"  style="left:44%;top:30%"></button>
      <button class="hotspot" data-num="5"  style="left:52%;top:30%"></button>
      <button class="hotspot" data-num="6"  style="left:60%;top:30%"></button>
      <button class="hotspot" data-num="7"  style="left:68%;top:30%"></button>
      <button class="hotspot" data-num="8"  style="left:20%;top:65%"></button>
      <button class="hotspot" data-num="9"  style="left:28%;top:65%"></button>
      <button class="hotspot" data-num="10" style="left:36%;top:65%"></button>
      <button class="hotspot" data-num="11" style="left:44%;top:65%"></button>
      <button class="hotspot" data-num="12" style="left:52%;top:65%"></button>
      <button class="hotspot" data-num="13" style="left:60%;top:65%"></button>
      <button class="hotspot" data-num="14" style="left:68%;top:65%"></button>
    </div>

    <div class="legend">
      <div class="legend-header">Properties 1–14</div>
      <div class="legend-list" id="legendList">
        <div class="loading">Loading resident data…</div>
      </div>
    </div>
  </div>
</main>

<!-- Admin modal (shared for edit property + change password) -->
<div class="admin-modal-overlay" id="adminModalOverlay">
  <div class="admin-modal" id="adminModalInner">
    <h3 id="adminModalTitle"></h3>
    <div id="adminModalBody"></div>
    <div class="admin-modal-actions">
      <button class="abtn abtn-muted" onclick="closeAdminModal()">Close</button>
      <button class="abtn" id="adminModalActionBtn" style="display:none;"></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
// Same Apps Script URL as your other pages
const CONFIG = {
  scriptUrl: 'YOUR_APPS_SCRIPT_URL_HERE'
};

// CSV fallback for read-only display when no script URL set
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQMtOVs8ca9B85tBEixrLIGjZ0qXZWcuw7ON0I1pSmTO3OD2sALZLPVEtQmEOAfxJb1HwvZbQCECfh5/pub?gid=204434224&single=true&output=csv';

// ─── STATE ───────────────────────────────────────────────────────────────────
let activeNum     = null;
let residents     = [];   // [{num, address, owner, tenant}]
let ADMIN_PASSWORD = null;
let isAdmin       = false;

const connected = CONFIG.scriptUrl !== 'YOUR_APPS_SCRIPT_URL_HERE';

// ─── GREETING ────────────────────────────────────────────────────────────────
(function() {
  const h = new Date().getHours();
  const g = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
  const d = new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
  document.getElementById('welcomeMsg').textContent = `${g} — ${d}`;
})();

// ─── ADMIN PASSWORD ───────────────────────────────────────────────────────────
async function fetchAdminPassword() {
  if (!connected) return;
  try {
    const res  = await fetch(`${CONFIG.scriptUrl}?action=readSettings`, { redirect: 'follow' });
    const data = await res.json();
    if (data.status === 'ok' && data.password) {
      ADMIN_PASSWORD = data.password;
      document.getElementById('adminBtn').style.display = '';
    }
  } catch(e) {
    console.warn('Could not load admin password');
  }
}

async function saveAdminPassword(newPassword) {
  await fetch(CONFIG.scriptUrl, {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'writePassword', password: newPassword })
  });
}

// ─── ADMIN LOGIN ──────────────────────────────────────────────────────────────
function toggleAdminLogin() {
  const box = document.getElementById('adminLoginBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  if (box.style.display === 'block') {
    document.getElementById('adminPwInput').focus();
    document.getElementById('adminErr').style.display = 'none';
    document.getElementById('adminPwInput').value = '';
    setTimeout(() => {
      document.addEventListener('click', function handler(e) {
        const box = document.getElementById('adminLoginBox');
        const btn = document.getElementById('adminBtn');
        if (!box.contains(e.target) && e.target !== btn) {
          box.style.display = 'none';
          document.removeEventListener('click', handler);
        }
      });
    }, 0);
  }
}

function checkAdmin() {
  const pw = document.getElementById('adminPwInput').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById('adminLoginBox').style.display = 'none';
    document.getElementById('adminBar').style.display = 'flex';
    document.getElementById('adminBtn').style.color = 'var(--accent2)';
    document.getElementById('adminPwInput').value = '';
    document.body.classList.add('admin-mode');
  } else {
    document.getElementById('adminErr').style.display = 'block';
  }
}

function exitAdmin() {
  isAdmin = false;
  document.getElementById('adminBar').style.display = 'none';
  document.getElementById('adminBtn').style.color = '';
  document.body.classList.remove('admin-mode');
  closeAdminModal();
}

// ─── ADMIN MODAL HELPERS ──────────────────────────────────────────────────────
function openAdminModal(title, bodyHTML, actionLabel, actionFn) {
  document.getElementById('adminModalTitle').textContent = title;
  document.getElementById('adminModalBody').innerHTML = bodyHTML;
  const btn = document.getElementById('adminModalActionBtn');
  if (actionLabel && actionFn) {
    btn.textContent = actionLabel;
    btn.onclick = actionFn;
    btn.style.display = 'inline-block';
  } else {
    btn.style.display = 'none';
  }
  document.getElementById('adminModalOverlay').classList.add('open');
}

function closeAdminModal() {
  document.getElementById('adminModalOverlay').classList.remove('open');
}

document.getElementById('adminModalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeAdminModal();
});

// ─── CHANGE PASSWORD ─────────────────────────────────────────────────────────
function showChangePassword() {
  const body = `
    <div class="modal-field">
      <label>Current Password</label>
      <input type="password" id="cpCurrent" placeholder="Current password">
    </div>
    <div class="modal-field">
      <label>New Password</label>
      <input type="password" id="cpNew" placeholder="New password">
    </div>
    <div class="modal-field">
      <label>Confirm New Password</label>
      <input type="password" id="cpConfirm" placeholder="Confirm new password">
    </div>
    <div id="cpErr" style="color:#b05050;font-size:0.78rem;display:none;margin-top:0.3rem;"></div>`;

  openAdminModal('🔑 Change Admin Password', body, 'Update Password', async () => {
    const cur     = document.getElementById('cpCurrent').value;
    const newPw   = document.getElementById('cpNew').value;
    const confirm = document.getElementById('cpConfirm').value;
    const err     = document.getElementById('cpErr');
    err.style.display = 'none';
    if (cur !== ADMIN_PASSWORD)  { err.textContent = 'Current password is incorrect'; err.style.display = 'block'; return; }
    if (!newPw)                  { err.textContent = 'New password cannot be empty';   err.style.display = 'block'; return; }
    if (newPw !== confirm)       { err.textContent = 'Passwords do not match';          err.style.display = 'block'; return; }
    closeAdminModal();
    ADMIN_PASSWORD = newPw;
    await saveAdminPassword(newPw);
    showToast('Password updated successfully', 'success');
  });
}

// ─── EDIT PROPERTY MODAL ─────────────────────────────────────────────────────
function openEditModal(preselectedNum) {
  const propOptions = residents.map(r =>
    `<option value="${r.num}"${r.num === preselectedNum ? ' selected' : ''}>${r.num} — ${esc(r.address)}</option>`
  ).join('');

  const selected = preselectedNum ? residents.find(r => r.num === preselectedNum) : null;

  const body = `
    <div class="modal-field">
      <label>Property</label>
      <select id="editPropSel" onchange="onEditPropChange()" style="appearance:none;background:white url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2210%22 height=%226%22 viewBox=%220 0 10 6%22%3E%3Cpath d=%22M1 1l4 4 4-4%22 stroke=%22%236b5f52%22 stroke-width=%221.5%22 fill=%22none%22 stroke-linecap=%22round%22/%3E%3C/svg%3E') no-repeat right 0.75rem center;cursor:pointer;">
        <option value="">— Select a property —</option>
        ${propOptions}
      </select>
    </div>
    <div id="editFields" style="${selected ? '' : 'display:none;'}">
      <div style="font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border);" id="editAddressLabel">${selected ? esc(selected.address) : ''}</div>
      <div class="modal-field">
        <label>Owner(s)</label>
        <input type="text" id="editOwner" placeholder="e.g. Jane &amp; John Smith" value="${selected ? esc(selected.owner) : ''}">
      </div>
      <div class="modal-field">
        <label>Tenant</label>
        <input type="text" id="editTenant" placeholder="Leave blank if owner-occupied" value="${selected ? esc(selected.tenant) : ''}">
        <p class="hint">Leave blank for owner-occupied. Enter tenant name if rented.</p>
      </div>
      <div id="editStatus" style="font-size:0.72rem;font-style:italic;color:var(--stone);min-height:1.2em;"></div>
    </div>`;

  openAdminModal('✎ Edit Property', body, 'Save Changes', savePropertyEdit);

  if (preselectedNum) {
    document.getElementById('adminModalActionBtn').disabled = false;
  } else {
    document.getElementById('adminModalActionBtn').disabled = true;
  }
}

function onEditPropChange() {
  const num = parseInt(document.getElementById('editPropSel').value);
  const r   = residents.find(x => x.num === num);
  const fields = document.getElementById('editFields');
  const btn = document.getElementById('adminModalActionBtn');

  if (!r) {
    fields.style.display = 'none';
    btn.disabled = true;
    return;
  }

  document.getElementById('editAddressLabel').textContent = r.address;
  document.getElementById('editOwner').value  = r.owner  || '';
  document.getElementById('editTenant').value = r.tenant || '';
  document.getElementById('editStatus').textContent = '';
  fields.style.display = 'block';
  btn.disabled = false;
  setTimeout(() => document.getElementById('editOwner').focus(), 50);
}

async function savePropertyEdit() {
  const num = parseInt(document.getElementById('editPropSel').value);
  const r   = residents.find(x => x.num === num);
  if (!r) return;

  const newOwner  = document.getElementById('editOwner').value.trim();
  const newTenant = document.getElementById('editTenant').value.trim();

  // Update local state immediately
  r.owner  = newOwner;
  r.tenant = newTenant;
  buildLegend();
  if (activeNum) selectProperty(activeNum); // restore highlight

  const statusEl = document.getElementById('editStatus');
  statusEl.style.color = 'var(--accent2)';
  statusEl.textContent = '⏳ Saving…';
  document.getElementById('adminModalActionBtn').disabled = true;

  if (connected) {
    try {
      const res  = await fetch(CONFIG.scriptUrl, {
        method: 'POST', redirect: 'follow',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'updateResidentMap', address: r.address, owner: r.owner, tenant: r.tenant })
      });
      const json = await res.json();
      if (json.status === 'ok') {
        statusEl.style.color = 'var(--green)';
        statusEl.textContent = '✓ Saved to Google Sheets';
        showToast('Saved to Google Sheets', 'success');
      } else {
        throw new Error(json.message);
      }
    } catch(e) {
      statusEl.style.color = 'var(--red)';
      statusEl.textContent = '⚠ Save failed — ' + e.message;
      showToast('Could not write to Sheets', 'error');
    }
  } else {
    statusEl.style.color = 'var(--green)';
    statusEl.textContent = '✓ Updated on page (configure scriptUrl for Sheets write-back)';
    showToast('Updated on page', 'success');
  }

  document.getElementById('adminModalActionBtn').disabled = false;
}

// ─── LOAD DATA ────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    if (connected) {
      const url  = `${CONFIG.scriptUrl}?action=readResidentMap&t=${Date.now()}`;
      const res  = await fetch(url, { redirect: 'follow' });
      const json = await res.json();
      if (json.status !== 'ok') throw new Error(json.message);
      residents = json.rows.map(r => ({
        num:     parseInt((r.address.match(/\d+/) || [0])[0]),
        address: r.address,
        owner:   r.owner,
        tenant:  r.tenant
      })).filter(r => r.num > 0);
    } else {
      // Fallback to published CSV (read-only)
      const res  = await fetch(SHEET_CSV + '&t=' + Date.now());
      const text = await res.text();
      residents  = parseCSV(text);
    }
    residents.sort((a, b) => a.num - b.num);
    buildLegend();
  } catch(e) {
    document.getElementById('legendList').innerHTML =
      '<div class="error-msg">Could not load resident data. Please refresh.</div>';
  }
}

function parseCSV(text) {
  return text.trim().split('\n').slice(1).map(line => {
    const cols = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    cols.push(cur.trim());
    const num = parseInt((cols[0] || '').match(/\d+/)?.[0]) || 0;
    return { num, address: cols[0]||'', owner: cols[1]||'', tenant: cols[2]||'' };
  }).filter(r => r.num > 0).sort((a, b) => a.num - b.num);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function tenantBadge(r) {
  if (!r.tenant) return '<span class="badge badge-owner">Owner occupied</span>';
  if (r.tenant.toLowerCase() === 'tenant') return '<span class="badge badge-tenant">Tenant</span>';
  return `<span class="badge badge-tenant">Tenant: ${esc(r.tenant)}</span>`;
}

function buildLegend() {
  document.getElementById('legendList').innerHTML = residents.map(r => `
    <div class="legend-row${r.num === activeNum ? ' active' : ''}" data-num="${r.num}" onclick="selectProperty(${r.num})">
      <div class="legend-num">${r.num}</div>
      <div class="legend-info">
        <div class="legend-owner">${esc(r.owner) || '<em style="color:var(--stone);font-weight:400;">Unset</em>'}</div>
        <div class="legend-tenant">${tenantBadge(r)}</div>
      </div>
      <button class="legend-edit-btn"
        onclick="event.stopPropagation();openEditModal(${r.num})"
        title="Edit this property">✎ Edit</button>
    </div>`).join('');
}

// ─── MAP INTERACTION ──────────────────────────────────────────────────────────
function selectProperty(num) {
  document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('active'));
  document.querySelectorAll('.legend-row').forEach(r => r.classList.remove('active'));
  if (activeNum === num) { activeNum = null; return; }
  activeNum = num;
  document.querySelector(`.hotspot[data-num="${num}"]`)?.classList.add('active');
  const row = document.querySelector(`.legend-row[data-num="${num}"]`);
  if (row) { row.classList.add('active'); row.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

document.querySelectorAll('.hotspot').forEach(h =>
  h.addEventListener('click', () => selectProperty(parseInt(h.dataset.num)))
);

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  const icon = type === 'success' ? '✓' : '✕';
  t.innerHTML = `<span style="font-size:1rem;opacity:0.9">${icon}</span> ${msg}`;
  t.className = `toast ${type} show`;
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.className = `toast ${type}`; }, 3200);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
fetchAdminPassword();
loadData();
</script>
